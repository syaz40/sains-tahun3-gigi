<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sains Tahun 3: Cabaran Pakar Gigi (Edisi Landscape TV)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #1e293b; 
            touch-action: none; 
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        h1, .font-title { font-family: 'Fredoka One', cursive; }
        
        /* Zon Drop - Diperbesarkan untuk paparan Landscape */
        .drop-zone {
            min-height: 180px;
            transition: all 0.2s ease;
            background-color: rgba(255, 255, 255, 0.05);
            border: 6px dashed rgba(255, 255, 255, 0.15);
            width: 100%;
        }
        .drop-zone.drag-over {
            background-color: rgba(34, 197, 94, 0.3);
            border-color: #22c55e;
            transform: scale(1.02);
        }

        /* Jawapan Draggable - MEGA GERGASI */
        .draggable {
            cursor: grab;
            user-select: none;
            touch-action: none;
            font-size: 2.5rem; /* Saiz teks sangat besar */
            font-weight: 900;
            border-width: 8px;
            width: 100%; /* Memenuhi lebar bar sisi kanan */
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background-color: #334155;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .draggable.dragging { opacity: 0.1; }

        /* Proxy visual semasa menarik (Sangat besar) */
        #drag-proxy {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            display: none;
            opacity: 0.95;
            transform: translate(-50%, -50%);
            background: white;
            color: black;
            padding: 2.5rem;
            border-radius: 3rem;
            border: 12px solid #3b82f6;
            box-shadow: 0 0 80px rgba(0,0,0,0.7);
            font-size: 3rem;
            font-weight: 900;
        }

        .slot-title {
            background: #0ea5e9;
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 15px;
            font-size: 2rem;
            font-weight: 800;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .timer-glow { text-shadow: 0 0 35px rgba(249, 115, 22, 0.9); }
        
        #audio-unlock-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #334155, #0f172a);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-mega {
            font-size: 4.5rem;
            padding: 3rem 8rem;
            border-radius: 150px;
            box-shadow: 0 25px 0 #1d4ed8;
            transition: all 0.1s;
        }
        .btn-mega:active {
            transform: translateY(12px);
            box-shadow: 0 8px 0 #1d4ed8;
        }

        /* Scrollbar untuk pool jawapan */
        #draggable-pool::-webkit-scrollbar { width: 15px; }
        #draggable-pool::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen w-screen flex flex-col p-4">

    <!-- OVERLAY AUDIO -->
    <div id="audio-unlock-overlay">
        <div class="text-center p-20 bg-slate-800 rounded-[5rem] border-[15px] border-sky-500 shadow-2xl">
            <h1 class="text-9xl text-sky-400 mb-10 font-title">PAKAR GIGI</h1>
            <p class="text-slate-300 mb-16 text-5xl font-bold italic">Sila naikkan suara iPad & TV anda!</p>
            <button onclick="initAudioSystem()" class="btn-mega bg-blue-600 hover:bg-blue-500 text-white font-title">
                KLIK MULA
            </button>
        </div>
    </div>

    <!-- Proxy Drag -->
    <div id="drag-proxy"></div>

    <!-- HEADER UTAMA -->
    <header class="h-[12vh] flex justify-between items-center px-12 bg-slate-800 rounded-t-[4rem] border-x-[15px] border-t-[15px] border-slate-700">
        <div class="flex items-center gap-8">
            <h1 class="text-6xl text-transparent bg-clip-text bg-gradient-to-r from-sky-300 to-blue-500 font-title">🦷 MISI PAKAR GIGI</h1>
            <p class="text-3xl text-slate-500 font-black tracking-widest uppercase">3 UPM</p>
        </div>
        <div class="bg-sky-500/20 text-sky-300 px-10 py-4 rounded-3xl text-4xl font-black border-4 border-sky-500/30">
            BAKI MURID: <span id="remaining-count">37</span>
        </div>
    </header>

    <!-- KAWASAN KANDUNGAN -->
    <main class="flex-grow relative bg-slate-800 border-x-[15px] border-b-[15px] border-slate-700 rounded-b-[4rem] overflow-hidden">
        
        <!-- SKRIN 1: NAME PICKER -->
        <div id="screen-picker" class="absolute inset-0 flex flex-col items-center justify-center p-10">
            <div id="name-display" class="text-7xl md:text-9xl font-title text-white mb-16 min-h-[220px] flex items-center justify-center bg-slate-900/60 px-24 rounded-[5rem] border-8 border-slate-600 shadow-2xl w-full max-w-6xl text-center leading-tight">
                SEDIA?
            </div>
            <button onclick="pickName()" id="btn-pick" class="bg-blue-600 hover:bg-blue-500 text-white text-8xl px-40 py-14 rounded-full font-title shadow-[0_20px_0_#1d4ed8] active:translate-y-4 active:shadow-none transition-all">
                PUSING NAMA!
            </button>
        </div>

        <!-- SKRIN 2: READY -->
        <div id="screen-ready" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-slate-800">
            <h2 class="text-6xl text-sky-400 font-title mb-10 italic">PAKAR SETERUSNYA...</h2>
            <div id="ready-name" class="text-7xl md:text-9xl font-black text-white mb-16 uppercase text-center bg-slate-900/50 p-24 rounded-[5rem] border-8 border-slate-700 shadow-2xl w-full max-w-[90%]">---</div>
            <button onclick="startGame()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-8xl px-48 py-16 rounded-full font-title shadow-[0_25px_0_#059669] active:translate-y-4 active:shadow-none transition-all animate-pulse">
                MULA!
            </button>
        </div>

        <!-- SKRIN 3: GAME BOARD (LANDSCAPE SPLIT) -->
        <div id="screen-game" class="hidden absolute inset-0 flex h-full">
            
            <!-- KIRI: SLOT GIGI (70%) -->
            <div class="w-[70%] h-full p-8 flex flex-col">
                <!-- Stats Atas -->
                <div class="flex justify-between items-center mb-8 bg-slate-900/50 p-8 rounded-[3rem] border-4 border-slate-700">
                    <div class="text-4xl font-black text-white truncate max-w-[60%]" id="current-player">---</div>
                    <div class="flex gap-16 text-center">
                        <div>
                            <p class="text-xl text-slate-500 font-black uppercase">Masa</p>
                            <div id="timer" class="text-8xl font-black text-orange-500 timer-glow leading-none">0</div>
                        </div>
                        <div>
                            <p class="text-xl text-slate-500 font-black uppercase">Skor</p>
                            <div id="score" class="text-8xl font-black text-emerald-400 leading-none">0/6</div>
                        </div>
                    </div>
                </div>

                <!-- 3 Slot Gigi Side-by-Side -->
                <div class="grid grid-cols-3 gap-8 flex-grow">
                    <!-- Gigi Kacip -->
                    <div class="bg-slate-700/40 p-6 rounded-[3.5rem] border-4 border-slate-600 flex flex-col items-center">
                        <div class="slot-title">KACIP</div>
                        <svg viewBox="0 0 100 100" class="w-32 h-32 mb-6 fill-white opacity-80"><path d="M20,10 L80,10 L85,80 C85,90 75,95 50,95 C25,95 15,90 15,80 Z" /></svg>
                        <div id="slot-kacip-function" data-type="kacip" data-category="function" class="drop-zone rounded-[2.5rem] mb-4 flex items-center justify-center p-4 text-slate-500 font-black text-2xl uppercase">Fungsi</div>
                        <div id="slot-kacip-food" data-type="kacip" data-category="food" class="drop-zone rounded-[2.5rem] flex items-center justify-center p-4 text-slate-500 font-black text-2xl uppercase">Makanan</div>
                    </div>
                    <!-- Gigi Taring -->
                    <div class="bg-slate-700/40 p-6 rounded-[3.5rem] border-4 border-slate-600 flex flex-col items-center">
                        <div class="slot-title bg-rose-600">TARING</div>
                        <svg viewBox="0 0 100 100" class="w-32 h-32 mb-6 fill-rose-500 opacity-80"><path d="M50,95 C20,95 15,80 15,70 L25,10 L50,40 L75,10 L85,70 C85,80 80,95 50,95 Z" /></svg>
                        <div id="slot-taring-function" data-type="taring" data-category="function" class="drop-zone rounded-[2.5rem] mb-4 flex items-center justify-center p-4 text-slate-500 font-black text-2xl uppercase">Fungsi</div>
                        <div id="slot-taring-food" data-type="taring" data-category="food" class="drop-zone rounded-[2.5rem] flex items-center justify-center p-4 text-slate-500 font-black text-2xl uppercase">Makanan</div>
                    </div>
                    <!-- Gigi Geraham -->
                    <div class="bg-slate-700/40 p-6 rounded-[3.5rem] border-4 border-slate-600 flex flex-col items-center">
                        <div class="slot-title bg-amber-600">GERAHAM</div>
                        <svg viewBox="0 0 100 100" class="w-32 h-32 mb-6 fill-amber-500 opacity-80"><path d="M20,20 C20,10 40,5 50,20 C60,5 80,10 80,20 L85,80 C85,90 75,95 50,95 C25,95 15,90 15,80 Z" /><rect x="30" y="25" width="40" height="10" rx="5" fill="black" opacity="0.2"/></svg>
                        <div id="slot-geraham-function" data-type="geraham" data-category="function" class="drop-zone rounded-[2.5rem] mb-4 flex items-center justify-center p-4 text-slate-500 font-black text-2xl uppercase">Fungsi</div>

                    </div>
                </div>
            </div>

            <!-- KANAN: POOL JAWAPAN (30%) -->
            <div class="w-[30%] h-full bg-slate-900/60 border-l-8 border-slate-700 p-8 flex flex-col">
                <h3 class="text-center font-black text-slate-500 mb-8 uppercase text-3xl italic">Pilih:</h3>
                <div id="draggable-pool" class="flex flex-col gap-8 overflow-y-auto pr-4 flex-grow">
                    <!-- Jawapan dijana di sini -->
                </div>
            </div>
        </div>

        <!-- SKRIN 4: RESULT -->
        <div id="screen-result" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-slate-900">
            <div class="text-[20rem] mb-12 animate-bounce">🏆</div>
            <h2 class="text-9xl font-title text-emerald-400 mb-8">SYABAS PAKAR!</h2>
            <div id="result-message" class="text-6xl mb-20 text-slate-300 text-center px-20">---</div>
            <button onclick="resetToPicker()" class="btn-mega bg-sky-600 hover:bg-sky-500 text-white font-title">MURID SETERUSNYA</button>
        </div>
    </main>

    <script>
        // ========================================================
        // 1. ENJIN AUDIO (SYNTH) - DIKUATKAN UNTUK IPAD PRO
        // ========================================================
        const AudioEngine = {
            ctx: null,
            bgLoop: null,
            isMuted: false,
            gameMode: false,
            speed: 1.0,

            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                this.playTone(880, 'sine', 0.1, 0.2); // Bunyi bip kuat tanda hidup
            },

            playTone(freq, type, duration, vol) {
                if (this.isMuted || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
                    osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            },

            sfx: {
                spin: () => AudioEngine.playTone(400 + (Math.random()*800), 'sine', 0.05, 0.05),
                correct: () => {
                    AudioEngine.playTone(523, 'sine', 0.2, 0.2);
                    setTimeout(() => AudioEngine.playTone(659, 'sine', 0.2, 0.2), 100);
                    setTimeout(() => AudioEngine.playTone(783, 'sine', 0.3, 0.2), 200);
                },
                wrong: () => {
                    AudioEngine.playTone(100, 'sawtooth', 0.5, 0.2);
                    AudioEngine.playTone(150, 'square', 0.5, 0.1);
                },
                victory: () => {
                    [523, 659, 783, 1046, 1318].forEach((f, i) => {
                        setTimeout(() => AudioEngine.playTone(f, 'sine', 0.8, 0.2), i * 150);
                    });
                }
            },

            startMusic(type) {
                this.stopMusic();
                this.gameMode = (type === 'game');
                let beat = 0;
                const loop = () => {
                    if (this.isMuted || !this.ctx) return;
                    if (this.gameMode) {
                        // Bass menderu (Debaran)
                        if (beat % 4 === 0) this.playTone(55, 'square', 0.6, 0.3); 
                        this.playTone(1200, 'sine', 0.05, 0.02); 
                        beat++;
                        this.bgLoop = setTimeout(loop, 450 / this.speed);
                    } else {
                        // Intro
                        if (beat % 4 === 0) this.playTone(261, 'square', 0.2, 0.08);
                        beat++;
                        this.bgLoop = setTimeout(loop, 600);
                    }
                };
                loop();
            },
            stopMusic() { clearTimeout(this.bgLoop); }
        };

        function initAudioSystem() {
            AudioEngine.init();
            document.getElementById('audio-unlock-overlay').style.display = 'none';
            AudioEngine.startMusic('intro');
        }

        function toggleMusicBtn() {
            AudioEngine.isMuted = !AudioEngine.isMuted;
            document.getElementById('music-icon').innerText = AudioEngine.isMuted ? '🔇' : '🔊';
            if (AudioEngine.isMuted) AudioEngine.stopMusic();
            else AudioEngine.startMusic(AudioEngine.gameMode ? 'game' : 'intro');
        }

        // ========================================================
        // 2. SENARAI 37 MURID PENUH (DARI CSV)
        // ========================================================
        let students = [
            "AAISYAH SAFFIYAH BINTI SHAIFOL ANNUAR", "ABDUL QAYYUM ABBASY BIN ABDUL AZIZ",
            "AHMAD TAQRIS BIN AHMAD TAQIYUDDIN", "AISHA AMINAH BINTI MOHD SHAH",
            "AISYAH ISLAMIAH BINTI MUHAMAD ALI", "ALEIA EVA DHIYA BINTI MOHD NAZAWEE",
            "AMMAR MIRZA BIN MOHD MUSTAZAHANHAR", "ANOAH ISVORIA JOSEPH",
            "ARIEL MALIQUE BIN JASMAN", "FARISH ZAKWAN BIN AHMAD MUSTAQIM",
            "HAMZAH YUSUF BIN MOHD FIRDAUS AKMAL", "ISMAIL NAUFAL BIN IBRAHIM",
            "MUHAMMAD AIDIL QAYYUM BIN MUHAMAD FARID", "MUHAMMAD AMMAR BIN MOHD NOR AFFENDY",
            "MUHAMMAD AMSYAR BIN MOHD NOR AZMI", "MUHAMMAD ARFILLA IRSYADA BIN MUKHLIS YASIN",
            "MUHAMMAD AZFAR AZALI BIN ABDUL LATIF", "MUHAMMAD EIMAN SHAQUILLE BIN HASNOL",
            "MUHAMMAD EUSOFF JIBRIEL BIN SAIFUL BAHARI", "MUHAMMAD FAIQ HAFIZH BIN MUHAMMAD FADHIL",
            "MUHAMMAD HARRAZ SYAHMI BIN JAMALUDIN", "NUH BIN ISMAIL",
            "MUHAMMAD SHARUL ISKANDAR BIN MOHD FAZLI", "MUHAMMAD ZAFRI ESMAIL BIN NASARUDDIN",
            "NAYLANIA RAMONA BINTI JAFNI RASYDI", "NUH BIN ISMAIL",
            "NUR AINUL MARDHIYAH BINTI MOHD ZAMZURI", "NUR AISY DELISHA BINTI MOHD SAFFARI",
            "NUR ALIA SOFEA BINTI HELMY SYAHRIZAD", "NUR NADIYAH ZAHRAH BINTI ABDUL YAZID",
            "POORRANI A/P PREM", "PUTERI NUR JANNAH BINTI PUTERA DAENIAL",
            "QHAISARA QHURAISYAH BINTI MUHAMMAD FAZLEE", "RAQEEN HAKIMI BIN ROHAIZAT",
            "SITI HAYRAA QUEENNARA BINTI SHEIKH HAZIQ", "THAQIFY ADIBA HATIJAH BINTI ABD RAZAK",
            "CHE DANISH BIN CHE ROSLI"
        ];

        // ========================================================
        // 3. LIBRARY JAWAPAN GERGASI (TIADA LAGI BOSAN)
        // ========================================================
        const functionLibrary = [
            { text: 'MEMOTONG MAKANAN', type: 'kacip', category: 'function' },
            { text: 'MENGOYAK MAKANAN', type: 'taring', category: 'function' },
            { text: 'MELUMAT MAKANAN', type: 'geraham', category: 'function' }
        ];

        const foodLibrary = {
            kacip: [
                { emoji: '🍎', name: 'EPAL' }, { emoji: '🥕', name: 'LOBAK' }, { emoji: '🍞', name: 'ROTI' },
                { emoji: '🍉', name: 'TEMBIKAI' }, { emoji: '🥒', name: 'TIMUN' }, { emoji: '🍫', name: 'COKLAT' },
                { emoji: '🥪', name: 'SANDWICH' }, { emoji: '🍐', name: 'PEAR' }, { emoji: '🧇', name: 'WAFEL' }
            ],
            taring: [
                { emoji: '🍗', name: 'AYAM' }, { emoji: '🥩', name: 'DAGING' }, { emoji: '🦑', name: 'SOTONG' },
                { emoji: '🦐', name: 'UDANG' }, { emoji: '🐟', name: 'IKAN' }, { emoji: '🦀', name: 'KETAM' },
                { emoji: '🍖', name: 'KAMBING' }, { emoji: '🥓', name: 'SALAI' }, { emoji: '🦃', name: 'TURKI' }
            ],
            geraham: [
                { emoji: '🥜', name: 'KACANG' }, { emoji: '🍪', name: 'BISKUT' }, { emoji: '🌽', name: 'JAGUNG' },
                { emoji: '🍚', name: 'NASI' }, { emoji: '🌰', name: 'BADAM' }, { emoji: '🌻', name: 'KUACI' },
                { emoji: '🍝', name: 'MI' }, { emoji: '🍘', name: 'KEROPOK' }, { emoji: '🥣', name: 'BIJIRIN' }
            ]
        };

        const distractors = [
            { text: 'MENGHIDU BAU', type: 'wrong', category: 'function', emoji: '👃' },
            { text: 'MELIHAT CAHAYA', type: 'wrong', category: 'function', emoji: '👁️' },
            { text: 'BERJALAN LAJU', type: 'wrong', category: 'function', emoji: '🚶' },
            { emoji: '🪨', name: 'BATU', type: 'wrong', category: 'food' },
            { emoji: '🥄', name: 'SUDU', type: 'wrong', category: 'food' },
            { emoji: '🧸', name: 'TEDDY', type: 'wrong', category: 'food' }
        ];

        let currentStudent = "", seconds = 0, score = 0, timer = null;

        // ========================================================
        // 4. SISTEM TOUCH DRAG (GERGASI & iPad Ready)
        // ========================================================
        let touchTarget = null;
        const dragProxy = document.getElementById('drag-proxy');

        function initTouchEvents() {
            document.addEventListener('touchstart', (e) => {
                const el = e.target.closest('.draggable');
                if (!el) return;
                
                // Paksa AudioContext resume pada setiap sentuhan
                if(AudioEngine.ctx && AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume();

                touchTarget = el;
                const rect = el.getBoundingClientRect();
                dragProxy.innerHTML = el.innerHTML;
                dragProxy.style.width = (rect.width * 1.3) + 'px'; 
                dragProxy.style.display = 'flex';
                updateProxyPos(e.touches[0].clientX, e.touches[0].clientY);
                el.classList.add('dragging');
            }, {passive: false});

            document.addEventListener('touchmove', (e) => {
                if (!touchTarget) return;
                e.preventDefault();
                updateProxyPos(e.touches[0].clientX, e.touches[0].clientY);
            }, {passive: false});

            document.addEventListener('touchend', (e) => {
                if (!touchTarget) return;
                const x = e.changedTouches[0].clientX;
                const y = e.changedTouches[0].clientY;
                dragProxy.style.display = 'none';
                touchTarget.classList.remove('dragging');
                
                const zone = document.elementsFromPoint(x, y).find(el => el.classList.contains('drop-zone'));
                if (zone) handleDropLogic(JSON.parse(touchTarget.dataset.info), zone, touchTarget);
                touchTarget = null;
            });
        }

        function updateProxyPos(x, y) {
            dragProxy.style.left = x + 'px';
            dragProxy.style.top = y + 'px';
        }

        // ========================================================
        // 5. LOGIK PERMAINAN
        // ========================================================
        function showScreen(id) {
            ['screen-picker', 'screen-ready', 'screen-game', 'screen-result'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function pickName() {
            if (students.length === 0) return;
            const btn = document.getElementById('btn-pick');
            const display = document.getElementById('name-display');
            btn.disabled = true;
            let count = 0;
            const interval = setInterval(() => {
                const temp = students[Math.floor(Math.random() * students.length)];
                display.innerText = temp;
                AudioEngine.sfx.spin();
                count++;
                if(count > 25) {
                    clearInterval(interval);
                    const idx = Math.floor(Math.random() * students.length);
                    currentStudent = students[idx];
                    students.splice(idx, 1);
                    document.getElementById('remaining-count').innerText = students.length;
                    display.classList.add('text-sky-400', 'scale-110');
                    setTimeout(() => {
                        showScreen('screen-ready');
                        document.getElementById('ready-name').innerText = currentStudent;
                    }, 1200);
                }
            }, 70);
        }

        function startGame() {
            showScreen('screen-game');
            document.getElementById('current-player').innerText = currentStudent;
            score = 0; seconds = 0;
            updateScoreDisplay();
            initPool();
            AudioEngine.speed = 1.0;
            AudioEngine.startMusic('game');
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = seconds;
            }, 1000);
        }

        function initPool() {
            const pool = document.getElementById('draggable-pool');
            pool.innerHTML = '';
            const correctFoods = [
                { ...foodLibrary.kacip[Math.floor(Math.random() * foodLibrary.kacip.length)], type: 'kacip', category: 'food' },
                { ...foodLibrary.taring[Math.floor(Math.random() * foodLibrary.taring.length)], type: 'taring', category: 'food' },
                { ...foodLibrary.geraham[Math.floor(Math.random() * foodLibrary.geraham.length)], type: 'geraham', category: 'food' }
            ];
            const shuffledDist = [...distractors].sort(() => 0.5 - Math.random()).slice(0, 5);
            const allItems = [...functionLibrary, ...correctFoods, ...shuffledDist].sort(() => 0.5 - Math.random());

            allItems.forEach(item => {
                const el = document.createElement('div');
                el.className = 'draggable rounded-3xl border-8 border-slate-600';
                el.dataset.info = JSON.stringify(item);
                if(item.category === 'function') el.innerHTML = `<span class="text-4xl">⚙️</span> <span>${item.text}</span>`;
                else el.innerHTML = `<span class="text-7xl">${item.emoji}</span> <span>${item.name || item.text}</span>`;
                pool.appendChild(el);
            });
        }

        function handleDropLogic(data, zone, originalEl) {
            if (data.type === zone.dataset.type && data.category === zone.dataset.category && zone.children.length <= 1) {
                AudioEngine.sfx.correct();
                zone.innerHTML = '';
                const success = originalEl.cloneNode(true);
                success.className = "flex flex-col items-center justify-center text-center scale-75 h-full w-full border-none bg-transparent shadow-none";
                zone.appendChild(success);
                originalEl.remove();
                score++;
                updateScoreDisplay();
                AudioEngine.speed = 1.0 + (score * 0.25);
                if(score === 6) finish();
            } else {
                AudioEngine.sfx.wrong();
                zone.classList.add('bg-rose-900/60', 'border-rose-500');
                setTimeout(() => zone.classList.remove('bg-rose-900/60', 'border-rose-500'), 500);
            }
        }

        function updateScoreDisplay() { document.getElementById('score').innerText = `${score}/6`; }

        function finish() {
            clearInterval(timer);
            AudioEngine.stopMusic();
            AudioEngine.sfx.victory();
            showScreen('screen-result');
            document.getElementById('result-message').innerHTML = `Luar Biasa <b>${currentStudent}</b>!<br>Siap dalam masa <span class="text-emerald-400">${seconds} SAAT</span>!`;
            confetti({ particleCount: 500, spread: 150, origin: { y: 0.6 } });
        }

        function resetToPicker() {
            AudioEngine.stopMusic();
            document.getElementById('btn-pick').disabled = false;
            document.getElementById('name-display').innerText = "SEDIA?";
            document.getElementById('name-display').classList.remove('text-sky-400', 'scale-110');
            showScreen('screen-picker');
            AudioEngine.startMusic('intro');
            document.querySelectorAll('.drop-zone').forEach(z => z.innerHTML = `<span class="uppercase opacity-20 text-3xl font-black">${z.dataset.category}</span>`);
        }

        window.onload = () => initTouchEvents();
    </script>
</body>
</html>
